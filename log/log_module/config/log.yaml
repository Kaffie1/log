root_dir: /var/log/robot
default_level: info
default_max_file_size_bytes: 20971520
max_files: 100
async_queue_size: 16384
async_worker_threads: 1
flush_interval_seconds: 1
enable_layer_aggregate: true
enable_json_output: false
sink:
  enable_console: true
  enable_module_file: true
  enable_layer_file: false
layers:
  L1:
    max_file_size_bytes: 20971520
  L2:
    max_file_size_bytes: 209715200
  L3:
    max_file_size_bytes: 52428800
modules:
  navigation:
    max_file_size_bytes: 52428800
